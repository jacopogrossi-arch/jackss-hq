<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Ragioneria — Parte I: Fondamenti e postulati</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --text: #e8e6e1;
    --muted: #9a968e;
    --accent: #d4a94e;
    --green: #4caf7d;
    --red: #d9534f;
    --border: #2a2e38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .container { width: 100%; max-width: 720px; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 1.4rem; color: var(--accent); letter-spacing: 0.5px; }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 18px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  .status { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
  }
  .question { font-size: 1.1rem; line-height: 1.5; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 0.98rem;
    line-height: 1.45;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); }
  .option:disabled { cursor: default; opacity: 0.85; }
  .option.correct { border-color: var(--green); background: rgba(76,175,125,0.12); }
  .option.wrong { border-color: var(--red); background: rgba(217,83,79,0.12); }
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.92rem;
    line-height: 1.55;
    display: none;
  }
  .feedback.ok { display: block; background: rgba(76,175,125,0.1); border: 1px solid var(--green); }
  .feedback.ko { display: block; background: rgba(217,83,79,0.1); border: 1px solid var(--red); }
  .feedback strong.verdict { display: block; margin-bottom: 6px; }
  .btn {
    margin-top: 20px;
    background: var(--accent);
    color: #14120c;
    border: none;
    border-radius: 8px;
    padding: 12px 26px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    display: none;
  }
  .btn:hover { filter: brightness(1.1); }
  .result { text-align: center; }
  .result h2 { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
  .result .score { font-size: 2.6rem; margin: 14px 0; }
  .result p { color: var(--muted); margin-bottom: 8px; }
  .errors-list { text-align: left; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
  .errors-list h3 { font-size: 1rem; color: var(--red); margin-bottom: 10px; }
  .errors-list li { margin-bottom: 8px; font-size: 0.9rem; color: var(--text); line-height: 1.4; margin-left: 18px; }
  footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Quiz Ragioneria — PARTE I</h1>
    <p>Fondamenti e postulati (Lezioni 1–6, OIC 11) · 20 domande</p>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="status">
    <span id="counter">Domanda 1 di 20</span>
    <span id="score">Punteggio: 0</span>
  </div>
  <div class="card" id="quiz-card">
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="next-btn">Prossima domanda →</button>
  </div>
  <footer>Fonte: RIPASSO_TEORIA_LAMPO.md — esame 16/07/2026 · In bocca al lupo! 🍀</footer>
</div>

<script>
const QUIZ = [
  {
    q: "1. Da quali documenti è composto il bilancio d'esercizio ex art. 2423 c.c.?",
    opts: [
      "Stato Patrimoniale, Conto Economico, Rendiconto Finanziario e Nota Integrativa",
      "Stato Patrimoniale, Conto Economico, Nota Integrativa e Relazione sulla Gestione",
      "Stato Patrimoniale, Conto Economico e Relazione sulla Gestione",
      "Stato Patrimoniale, Conto Economico, Rendiconto Finanziario e Relazione del Collegio Sindacale"
    ],
    correct: 0,
    exp: "Il bilancio è composto da SP, CE, Rendiconto Finanziario e Nota Integrativa. La Relazione sulla Gestione (art. 2428) accompagna il bilancio ma NON ne fa parte."
  },
  {
    q: "2. Quali sono i limiti del bilancio abbreviato (art. 2435-bis)?",
    opts: [
      "Totale attivo 4,4 mln € · ricavi 8,8 mln € · 50 dipendenti medi (non superarne 2 su 3 per due esercizi consecutivi)",
      "Totale attivo 175.000 € · ricavi 350.000 € · 5 dipendenti medi (non superarne 2 su 3 per due esercizi consecutivi)",
      "Totale attivo 8,8 mln € · ricavi 4,4 mln € · 250 dipendenti medi (non superarne nemmeno 1 per un esercizio)",
      "Totale attivo 4,4 mln € · ricavi 8,8 mln € · 50 dipendenti medi (basta non superarne 1 per un solo esercizio)"
    ],
    correct: 0,
    exp: "Abbreviato: attivo 4,4 mln, ricavi 8,8 mln, 50 dipendenti — non superare 2 dei 3 limiti per due esercizi consecutivi. I limiti 175.000/350.000/5 sono quelli delle micro-imprese (art. 2435-ter)."
  },
  {
    q: "3. Qual è la clausola generale del bilancio (art. 2423, co. 2)?",
    opts: [
      "Il bilancio deve essere redatto con chiarezza e rappresentare in modo veritiero e corretto la situazione patrimoniale, finanziaria e il risultato economico",
      "Il bilancio deve essere redatto secondo prudenza e nella prospettiva della continuazione dell'attività",
      "Il bilancio deve rappresentare la verità oggettiva dei valori aziendali, senza margini di stima",
      "Il bilancio deve essere redatto secondo i principi contabili internazionali IAS/IFRS"
    ],
    correct: 0,
    exp: "Chiarezza + rappresentazione veritiera e corretta (RVC): è una norma sovra-ordinata a tutti gli altri principi. Prudenza e continuità sono postulati dell'art. 2423-bis, non la clausola generale."
  },
  {
    q: "4. Cosa significa \"veritiero\" nella rappresentazione veritiera e corretta?",
    opts: [
      "Che i redattori operano correttamente le stime e ne rappresentano il risultato — non verità oggettiva",
      "Che tutti i valori di bilancio devono corrispondere alla verità oggettiva, senza eccezioni",
      "Che il bilancio deve rispettare forma e struttura degli schemi di legge",
      "Che il bilancio deve essere certificato da un revisore esterno indipendente"
    ],
    correct: 0,
    exp: "\"Veritiero\" deriva dal \"true and fair view\" della IV Direttiva CEE e NON significa verità oggettiva (impossibile per i valori stimati): significa operare correttamente le stime. Il rispetto di forma e struttura è la \"chiarezza\"."
  },
  {
    q: "5. Cosa prevede il postulato della completezza informativa (art. 2423, co. 3)?",
    opts: [
      "Se le informazioni richieste dal codice civile non sono sufficienti a dare una RVC, si devono fornire le informazioni complementari necessarie",
      "Tutte le voci di bilancio devono essere compilate, anche se a valore zero",
      "La Nota Integrativa deve riportare tutti i movimenti contabili dell'esercizio",
      "Il bilancio deve includere sempre anche il bilancio consolidato di gruppo"
    ],
    correct: 0,
    exp: "Art. 2423, co. 3: se le informazioni di legge non bastano per la rappresentazione veritiera e corretta, vanno fornite informazioni complementari."
  },
  {
    q: "6. La deroga per casi eccezionali (art. 2423, co. 5) è una facoltà o un obbligo?",
    opts: [
      "È un obbligo: la norma incompatibile con la RVC non deve essere applicata, e gli utili da deroga vanno in riserva non distribuibile",
      "È una facoltà rimessa alla discrezionalità degli amministratori, senza vincoli sugli utili",
      "È un obbligo, ma gli utili da deroga sono liberamente distribuibili ai soci",
      "È una facoltà che richiede l'autorizzazione preventiva del tribunale"
    ],
    correct: 0,
    exp: "È un OBBLIGO: se in casi eccezionali una norma è incompatibile con la RVC, non deve essere applicata. Le deroghe vanno motivate in NI con gli effetti, e gli utili da deroga vanno in riserva non distribuibile finché il maggior valore non è realizzato."
  },
  {
    q: "7. Quale tra questi NON è un \"caso eccezionale\" che legittima la deroga ex art. 2423, co. 5?",
    opts: [
      "La scarsa significatività dei valori storici per effetto dell'inflazione",
      "Il cambiamento di destinazione economica del bene (terreno agricolo che diventa edificabile)",
      "L'eliminazione di vincoli o servitù sul bene",
      "Il compromesso di vendita firmato prima del 31/12 a prezzo superiore al valore contabile"
    ],
    correct: 0,
    exp: "L'inflazione NON è caso eccezionale: per quella servono le leggi speciali di rivalutazione (facoltative, logica diversa). I casi eccezionali riguardano i beni: cambio di destinazione economica, eliminazione di vincoli, cambio di destinazione giuridica."
  },
  {
    q: "8. Qual è la scrittura della rivalutazione da deroga alla chiusura dell'esercizio?",
    opts: [
      "Fabbricato (SP B.II.1) a Rivalutazioni (CE A.5)",
      "Fabbricato (SP B.II.1) a Riserva di rivalutazione (SP A.III)",
      "Rivalutazioni (CE A.5) a Fabbricato (SP B.II.1)",
      "Fabbricato (SP B.II.1) a Utile d'esercizio (SP A.IX)"
    ],
    correct: 0,
    exp: "Alla chiusura: Fabbricato a Rivalutazioni (CE A.5). Poi, all'approvazione del bilancio: Utile d'esercizio a Riserva da deroghe (riserva non distribuibile)."
  },
  {
    q: "9. Quali sono i postulati elencati dall'art. 2423-bis, co. 1?",
    opts: [
      "Continuità aziendale, prudenza, rappresentazione sostanziale, competenza, valutazione separata, costanza dei criteri",
      "Chiarezza, verità, correttezza, completezza, rilevanza, comparabilità",
      "Continuità aziendale, prudenza, competenza, rilevanza, comparabilità, neutralità",
      "Prudenza, competenza, costo storico, costanza, atomisticità, trasparenza"
    ],
    correct: 0,
    exp: "Art. 2423-bis: (1) continuità, (2) prudenza, (3) rappresentazione sostanziale, (4) competenza, (5) valutazione separata/atomistica, (6) costanza dei criteri. Rilevanza (art. 2423 c.4) e comparabilità (art. 2423-ter c.5) hanno fonti diverse."
  },
  {
    q: "10. Su quale orizzonte temporale gli amministratori devono accertare la continuità aziendale (going concern)?",
    opts: [
      "Almeno 12 mesi dalla data di riferimento del bilancio",
      "Almeno 24 mesi dalla data di approvazione del bilancio",
      "Fino alla chiusura dell'esercizio successivo, senza obbligo di verifica",
      "Almeno 6 mesi dalla data di approvazione del bilancio"
    ],
    correct: 0,
    exp: "OIC 11: gli amministratori devono ACCERTARE (non presumere) la capacità di continuare come complesso economico funzionante per almeno 12 mesi dalla data di riferimento del bilancio. È il \"proto-postulato\"."
  },
  {
    q: "11. Qual è il capitale minimo legale di una S.p.A. (art. 2327)?",
    opts: [
      "50.000 €",
      "10.000 €",
      "120.000 €",
      "100.000 €"
    ],
    correct: 0,
    exp: "50.000 € per le S.p.A. Se le perdite riducono il capitale sotto il minimo legale: o ricapitalizzazione o scioglimento (causa tipica di perdita della continuità)."
  },
  {
    q: "12. Come tratta il postulato della prudenza gli utili sperati e le perdite presunte?",
    opts: [
      "Divieto di contabilizzare gli utili sperati; obbligo di contabilizzare le perdite presunte se probabili e quantificabili",
      "Divieto di contabilizzare sia utili sperati sia perdite presunte fino al realizzo",
      "Obbligo di contabilizzare sia utili sperati sia perdite presunte, per simmetria",
      "Facoltà di contabilizzare gli utili sperati; divieto di contabilizzare le perdite presunte"
    ],
    correct: 0,
    exp: "Asimmetria delle stime: solo utili REALIZZATI alla chiusura (divieto per gli sperati), obbligo per le perdite presunte anche se conosciute dopo la chiusura. Limite: la prudenza non deve creare riserve occulte."
  },
  {
    q: "13. Qual è l'esempio classico di prevalenza della sostanza sulla forma?",
    opts: [
      "Il pronti contro termine (PCT): nella forma vendita di titoli, nella sostanza finanziamento garantito da titoli",
      "Il leasing operativo: nella forma noleggio, nella sostanza acquisto a rate",
      "Il factoring pro-soluto: nella forma cessione di crediti, nella sostanza prestito bancario",
      "L'affitto d'azienda: nella forma locazione, nella sostanza cessione definitiva"
    ],
    correct: 0,
    exp: "Il PCT: i titoli restano nello SP del venditore (art. 2424-bis, co. 5); proventi e oneri, inclusa la differenza pronti/termine, vanno in C.16 e C.17 per competenza."
  },
  {
    q: "14. Quando un COSTO è di competenza economica dell'esercizio?",
    opts: [
      "Se si è realizzato il correlativo ricavo, si è utilizzato il servizio, oppure ricavo o servizio sono svaniti",
      "Quando è avvenuto il pagamento in denaro",
      "Quando è stata ricevuta la fattura del fornitore",
      "Quando il bene è stato ordinato al fornitore"
    ],
    correct: 0,
    exp: "Il costo è di competenza se: (a) si è realizzato il correlativo ricavo, (b) si è utilizzato il servizio, (c) ricavo o servizio sono svaniti. La manifestazione monetaria (pagamento) non conta: è il principio di cassa, non di competenza."
  },
  {
    q: "15. Cosa vieta il postulato della valutazione atomistica?",
    opts: [
      "I compensi di partite: gli elementi eterogenei nelle singole voci si valutano separatamente",
      "Il cambiamento dei criteri di valutazione da un esercizio all'altro",
      "La contabilizzazione di utili non realizzati",
      "L'iscrizione di beni non di proprietà dell'azienda"
    ],
    correct: 0,
    exp: "Atomistica: valutazione separata degli elementi eterogenei, vietati i compensi di partite (art. 2423-ter). Il divieto di cambiare criteri è la COSTANZA; il divieto di utili non realizzati è la PRUDENZA."
  },
  {
    q: "16. Cosa prevede il principio di rilevanza (art. 2423, co. 4)?",
    opts: [
      "Non occorre rispettare gli obblighi di rilevazione, valutazione, presentazione e informativa quando la loro osservanza ha effetti irrilevanti sulla RVC",
      "Le voci di importo inferiore a 1.000 € possono essere omesse dal bilancio",
      "Solo le operazioni rilevanti vanno registrate in contabilità generale",
      "Le voci irrilevanti vanno raggruppate obbligatoriamente in un'unica voce residuale"
    ],
    correct: 0,
    exp: "Introdotto dal D.Lgs. 139/2015. Restano fermi gli obblighi di regolare tenuta contabile; i criteri applicativi vanno in NI. La rilevanza si giudica con fattori quantitativi E qualitativi — non c'è una soglia fissa in euro."
  },
  {
    q: "17. Cosa richiede il principio di comparabilità (art. 2423-ter, co. 5)?",
    opts: [
      "Per ogni voce va indicato l'importo dell'esercizio precedente; se non comparabili, le voci precedenti vanno adattate con segnalazione in NI",
      "Il bilancio va confrontato con quello dei principali concorrenti del settore",
      "Le voci non comparabili vanno semplicemente omesse dal bilancio",
      "Vanno indicati gli importi degli ultimi cinque esercizi per ogni voce"
    ],
    correct: 0,
    exp: "Ogni voce riporta l'importo dell'esercizio precedente; se le voci non sono comparabili, quelle precedenti vanno adattate, segnalando e commentando l'adattamento in Nota Integrativa."
  },
  {
    q: "18. Qual è la gerarchia delle fonti sul bilancio per le società non quotate italiane?",
    opts: [
      "Codice civile (norme primarie) → principi contabili nazionali OIC che interpretano e integrano le norme di legge",
      "Principi OIC → codice civile → IAS/IFRS in via residuale",
      "IAS/IFRS obbligatori per tutte le società, integrati dal codice civile",
      "Solo il codice civile: i principi OIC sono facoltativi e privi di valore interpretativo"
    ],
    correct: 0,
    exp: "Codice civile → OIC (interpretano e integrano). Gli IAS/IFRS sono obbligatori per le quotate e altri soggetti (D.Lgs. 38/2005), volontari per alcune categorie. Per le non quotate italiane: c.c. + OIC."
  },
  {
    q: "19. Entro quanto tempo l'assemblea di una S.p.A. approva il bilancio, e quando va depositato al Registro delle imprese?",
    opts: [
      "Approvazione entro 120 giorni dalla chiusura (180 per particolari esigenze); deposito entro 30 giorni dall'approvazione",
      "Approvazione entro 90 giorni dalla chiusura; deposito entro 60 giorni dall'approvazione",
      "Approvazione entro 180 giorni dalla chiusura in ogni caso; deposito entro 15 giorni",
      "Approvazione entro 120 giorni dalla chiusura, senza eccezioni; deposito entro 90 giorni"
    ],
    correct: 0,
    exp: "Assemblea entro 120 giorni (180 per particolari esigenze, es. bilancio consolidato, se previsto dallo statuto); deposito al Registro delle imprese entro 30 giorni dall'approvazione. Prima: progetto degli amministratori → Collegio Sindacale e revisore (30 gg prima) → deposito in sede 15 gg prima."
  },
  {
    q: "20. Riserva legale (art. 2430): quanto si accantona e fino a che limite?",
    opts: [
      "Almeno il 5% dell'utile netto annuale, finché la riserva non raggiunge il 20% del capitale sociale",
      "Almeno il 20% dell'utile netto annuale, finché la riserva non raggiunge il 5% del capitale sociale",
      "Almeno il 10% dell'utile netto annuale, senza limite massimo",
      "Almeno il 5% del capitale sociale ogni anno, finché la riserva non eguaglia il capitale"
    ],
    correct: 0,
    exp: "Il 5% (la ventesima parte) dell'utile netto annuale, fino al 20% (il quinto) del capitale sociale. Serve a copertura perdite (utilizzo B), non è distribuibile."
  }
];

// Mescola le opzioni di ogni domanda mantenendo traccia della corretta
QUIZ.forEach(item => {
  const indices = item.opts.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  item.shuffled = indices.map(i => item.opts[i]);
  item.correctShuffled = indices.indexOf(item.correct);
});

let current = 0;
let score = 0;
const wrongAnswers = [];

const qEl = document.getElementById('question');
const optsEl = document.getElementById('options');
const fbEl = document.getElementById('feedback');
const nextBtn = document.getElementById('next-btn');
const counterEl = document.getElementById('counter');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');

function renderQuestion() {
  const item = QUIZ[current];
  counterEl.textContent = `Domanda ${current + 1} di ${QUIZ.length}`;
  progressEl.style.width = `${(current / QUIZ.length) * 100}%`;
  qEl.textContent = item.q;
  fbEl.className = 'feedback';
  fbEl.innerHTML = '';
  nextBtn.style.display = 'none';
  optsEl.innerHTML = '';
  item.shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = String.fromCharCode(65 + i) + ') ' + opt;
    btn.onclick = () => answer(i, btn);
    optsEl.appendChild(btn);
  });
}

function answer(chosen, btn) {
  const item = QUIZ[current];
  const buttons = optsEl.querySelectorAll('.option');
  buttons.forEach(b => b.disabled = true);
  buttons[item.correctShuffled].classList.add('correct');
  const isCorrect = chosen === item.correctShuffled;
  if (isCorrect) {
    score++;
    fbEl.className = 'feedback ok';
    fbEl.innerHTML = '<strong class="verdict">✅ Esatto!</strong>' + item.exp;
  } else {
    btn.classList.add('wrong');
    wrongAnswers.push(item.q);
    fbEl.className = 'feedback ko';
    fbEl.innerHTML = '<strong class="verdict">❌ Sbagliato.</strong>' + item.exp;
  }
  scoreEl.textContent = `Punteggio: ${score}`;
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent = current === QUIZ.length - 1 ? 'Vedi risultato →' : 'Prossima domanda →';
}

nextBtn.onclick = () => {
  current++;
  if (current < QUIZ.length) {
    renderQuestion();
  } else {
    showResult();
  }
};

function showResult() {
  progressEl.style.width = '100%';
  counterEl.textContent = 'Completato';
  const pct = Math.round((score / QUIZ.length) * 100);
  let verdict;
  if (pct === 100) verdict = 'Perfetto! Sei pronto per la Parte I. 🏆';
  else if (pct >= 80) verdict = 'Ottimo! Ripassa solo le domande sbagliate.';
  else if (pct >= 60) verdict = 'Buona base, ma rifai un giro sulle sbagliate.';
  else verdict = 'Serve un altro ripasso della Parte I sul file RIPASSO_TEORIA_LAMPO.';
  let html = `<div class="result">
    <h2>Risultato finale</h2>
    <div class="score">${score} / ${QUIZ.length}</div>
    <p>${pct}% — ${verdict}</p>`;
  if (wrongAnswers.length > 0) {
    html += `<div class="errors-list"><h3>Domande da ripassare:</h3><ul>`;
    wrongAnswers.forEach(w => { html += `<li>${w}</li>`; });
    html += `</ul></div>`;
  }
  html += `<button class="btn" style="display:inline-block" onclick="location.reload()">Ricomincia il quiz ↺</button></div>`;
  document.getElementById('quiz-card').innerHTML = html;
}

renderQuestion();
</script>
</body>
</html>
