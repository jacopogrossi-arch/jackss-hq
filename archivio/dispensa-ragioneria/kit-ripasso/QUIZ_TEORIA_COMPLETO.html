<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Quiz Ragioneria — Teoria completa</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --text: #e8e6e1;
    --muted: #9a968e;
    --accent: #d4a94e;
    --green: #4caf7d;
    --red: #d9534f;
    --border: #2a2e38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }
  .container { width: 100%; max-width: 720px; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 1.4rem; color: var(--accent); letter-spacing: 0.5px; }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 18px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  .status { display: flex; justify-content: space-between; color: var(--muted); font-size: 0.85rem; margin-bottom: 12px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
  }
  .part-tag { display: inline-block; font-size: 0.72rem; color: var(--accent); border: 1px solid var(--accent); border-radius: 20px; padding: 2px 10px; margin-bottom: 12px; letter-spacing: 0.5px; }
  .question { font-size: 1.1rem; line-height: 1.5; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 0.98rem;
    line-height: 1.45;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); }
  .option:disabled { cursor: default; opacity: 0.85; }
  .option.correct { border-color: var(--green); background: rgba(76,175,125,0.12); }
  .option.wrong { border-color: var(--red); background: rgba(217,83,79,0.12); }
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.92rem;
    line-height: 1.55;
    display: none;
  }
  .feedback.ok { display: block; background: rgba(76,175,125,0.1); border: 1px solid var(--green); }
  .feedback.ko { display: block; background: rgba(217,83,79,0.1); border: 1px solid var(--red); }
  .feedback strong.verdict { display: block; margin-bottom: 6px; }
  .btn {
    margin-top: 20px;
    background: var(--accent);
    color: #14120c;
    border: none;
    border-radius: 8px;
    padding: 12px 26px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn.secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); font-weight: normal; }
  .btn.secondary:hover { color: var(--text); border-color: var(--muted); }
  .result { text-align: center; }
  .result h2 { color: var(--accent); font-size: 1.6rem; margin-bottom: 10px; }
  .result .score { font-size: 2.6rem; margin: 14px 0; }
  .result p { color: var(--muted); margin-bottom: 8px; }
  .errors-list { text-align: left; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
  .errors-list h3 { font-size: 1rem; color: var(--red); margin-bottom: 10px; }
  .errors-list li { margin-bottom: 8px; font-size: 0.9rem; line-height: 1.4; margin-left: 18px; }
  .home { text-align: center; }
  .home .big-avg { font-size: 2.8rem; color: var(--accent); margin: 10px 0 4px; }
  .home .avg-label { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .stats-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 22px; flex-wrap: wrap; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; min-width: 100px; }
  .stat-box .num { font-size: 1.4rem; color: var(--text); }
  .stat-box .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .history { text-align: left; margin-top: 26px; border-top: 1px solid var(--border); padding-top: 18px; }
  .history h3 { font-size: 1rem; color: var(--accent); margin-bottom: 12px; }
  .history table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .history th { text-align: left; color: var(--muted); font-weight: normal; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .history td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
  .history td.good { color: var(--green); }
  .history td.bad { color: var(--red); }
  .history .empty { color: var(--muted); font-size: 0.9rem; }
  footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 20px; }
</style>
</head>

const QUESTIONS_PER_QUIZ = 10;
const STORAGE_KEY = 'quizRagioneriaRisultati';

let sessionQuestions = [];
let current = 0;
let score = 0;
let wrongAnswers = [];

const cardEl = document.getElementById('main-card');
const counterEl = document.getElementById('counter');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');

function loadResults() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveResult(score, total, wrong) {
  const results = loadResults();
  results.push({ date: new Date().toISOString(), score, total, wrong });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + ' ' +
         d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}

// ---------- SCHERMATA INIZIALE ----------
function showHome() {
  counterEl.textContent = '';
  scoreEl.textContent = '';
  progressEl.style.width = '0%';
  const results = loadResults();
  let html = '<div class="home">';
  if (results.length > 0) {
    const totScore = results.reduce((s, r) => s + r.score, 0);
    const totQ = results.reduce((s, r) => s + r.total, 0);
    const avgPct = Math.round((totScore / totQ) * 100);
    const best = Math.max(...results.map(r => Math.round((r.score / r.total) * 100)));
    const last = results[results.length - 1];
    html += `<div class="big-avg">${avgPct}%</div>
      <div class="avg-label">media su ${results.length} quiz completat${results.length === 1 ? 'o' : 'i'}</div>
      <div class="stats-row">
        <div class="stat-box"><div class="num">${results.length}</div><div class="lbl">quiz fatti</div></div>
        <div class="stat-box"><div class="num">${best}%</div><div class="lbl">migliore</div></div>
        <div class="stat-box"><div class="num">${Math.round((last.score / last.total) * 100)}%</div><div class="lbl">ultimo</div></div>
      </div>`;
  } else {
    html += `<p style="color:var(--muted); margin-bottom:18px;">Nessun quiz completato finora.<br>Ogni sessione: <strong style="color:var(--text)">10 domande casuali</strong> pescate da tutte le ${QUIZ.length} del ripasso lampo.</p>`;
  }
  html += `<button class="btn" onclick="startQuiz()">Inizia un quiz →</button>`;
  if (results.length > 0) {
    html += `<div class="history"><h3>Risultati precedenti</h3><table>
      <tr><th>#</th><th>Data</th><th>Punteggio</th><th>%</th></tr>`;
    results.slice().reverse().forEach((r, i) => {
      const pct = Math.round((r.score / r.total) * 100);
      const cls = pct >= 60 ? 'good' : 'bad';
      html += `<tr><td>${results.length - i}</td><td>${fmtDate(r.date)}</td><td>${r.score}/${r.total}</td><td class="${cls}">${pct}%</td></tr>`;
    });
    html += `</table>
      <button class="btn secondary" onclick="clearHistory()" style="margin-top:14px; font-size:0.85rem; padding:8px 16px;">Cancella lo storico</button></div>`;
  }
  html += '</div>';
  cardEl.innerHTML = html;
}

function clearHistory() {
  if (confirm('Vuoi davvero cancellare tutti i risultati salvati?')) {
    localStorage.removeItem(STORAGE_KEY);
    showHome();
  }
}

// ---------- QUIZ ----------
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  sessionQuestions = shuffle(QUIZ).slice(0, QUESTIONS_PER_QUIZ).map(item => {
    const indices = shuffle(item.opts.map((_, i) => i));
    return {
      part: item.part, q: item.q, exp: item.exp,
      shuffled: indices.map(i => item.opts[i]),
      correctShuffled: indices.indexOf(0)
    };
  });
  current = 0;
  score = 0;
  wrongAnswers = [];
  renderQuestion();
}

function renderQuestion() {
  const item = sessionQuestions[current];
  counterEl.textContent = `Domanda ${current + 1} di ${sessionQuestions.length}`;
  scoreEl.textContent = `Punteggio: ${score}`;
  progressEl.style.width = `${(current / sessionQuestions.length) * 100}%`;
  let html = `<span class="part-tag">${item.part}</span>
    <div class="question">${item.q}</div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="next-btn" style="display:none"></button>`;
  cardEl.innerHTML = html;
  const optsEl = document.getElementById('options');
  item.shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = String.fromCharCode(65 + i) + ') ' + opt;
    btn.onclick = () => answer(i, btn);
    optsEl.appendChild(btn);
  });
}

function answer(chosen, btn) {
  const item = sessionQuestions[current];
  const optsEl = document.getElementById('options');
  const fbEl = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  const buttons = optsEl.querySelectorAll('.option');
  buttons.forEach(b => b.disabled = true);
  buttons[item.correctShuffled].classList.add('correct');
  if (chosen === item.correctShuffled) {
    score++;
    fbEl.className = 'feedback ok';
    fbEl.innerHTML = '<strong class="verdict">✅ Esatto!</strong>' + item.exp;
  } else {
    btn.classList.add('wrong');
    wrongAnswers.push(`[${item.part}] ${item.q}`);
    fbEl.className = 'feedback ko';
    fbEl.innerHTML = '<strong class="verdict">❌ Sbagliato.</strong>' + item.exp;
  }
  scoreEl.textContent = `Punteggio: ${score}`;
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent = current === sessionQuestions.length - 1 ? 'Vedi risultato →' : 'Prossima domanda →';
  nextBtn.onclick = () => {
    current++;
    if (current < sessionQuestions.length) renderQuestion();
    else showResult();
  };
}

function showResult() {
  progressEl.style.width = '100%';
  counterEl.textContent = 'Completato';
  saveResult(score, sessionQuestions.length, wrongAnswers);
  const results = loadResults();
  const totScore = results.reduce((s, r) => s + r.score, 0);
  const totQ = results.reduce((s, r) => s + r.total, 0);
  const avgPct = Math.round((totScore / totQ) * 100);
  const pct = Math.round((score / sessionQuestions.length) * 100);
  let verdict;
  if (pct === 100) verdict = 'Perfetto! 🏆';
  else if (pct >= 80) verdict = 'Ottimo! Ripassa solo le sbagliate.';
  else if (pct >= 60) verdict = 'Buona base, rifai un giro sulle sbagliate.';
  else verdict = 'Serve un altro ripasso sul file RIPASSO_TEORIA_LAMPO.';
  let html = `<div class="result">
    <h2>Risultato</h2>
    <div class="score">${score} / ${sessionQuestions.length}</div>
    <p>${pct}% — ${verdict}</p>
    <p style="margin-top:10px;">Media complessiva: <strong style="color:var(--accent)">${avgPct}%</strong> su ${results.length} quiz</p>`;
  if (wrongAnswers.length > 0) {
    html += `<div class="errors-list"><h3>Domande da ripassare:</h3><ul>`;
    wrongAnswers.forEach(w => { html += `<li>${w}</li>`; });
    html += `</ul></div>`;
  }
  html += `<button class="btn" onclick="startQuiz()">Nuovo quiz (altre 10 domande) ↺</button>
    <button class="btn secondary" onclick="showHome()">Vai allo storico</button></div>`;
  cardEl.innerHTML = html;
}

showHome();
</script>
